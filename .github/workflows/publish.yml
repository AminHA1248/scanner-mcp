name: Publish to PyPI

# Publishes to PyPI whenever you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token needs to be stored as a secret.
# One-time setup on PyPI: create a "pending publisher" for project `scanner-mcp` with
#   Owner: AminHA1248   Repo: scanner-mcp   Workflow: publish.yml   Environment: pypi
# (https://pypi.org/manage/account/publishing/)

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  bundle:
    # Build the Claude Desktop extension (.mcpb) and attach it to the release.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to upload a release asset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build icon and pack bundle
        run: |
          python -m pip install --upgrade pillow
          python mcpb/make_icon.py
          npx --yes @anthropic-ai/mcpb@latest pack mcpb "dist/scanner-mcp-${GITHUB_REF_NAME#v}.mcpb"
      - name: Attach .mcpb to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/scanner-mcp-*.mcpb --clobber
